<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Templates — Awesome Crew</title>
  <meta name="description" content="Curated open-source landing page templates. Browse by category and use as a starting point for AI generation."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="theme.css" rel="stylesheet"/>
  <script>if(localStorage.getItem('ac-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <script src="theme.js" defer></script>
  <style>
    :root {
      --bg: #F5F1E8; --grid: #E6E1D8;
      --text: #111827; --text-sec: #374151; --text-muted: #6B7280;
      --container: #EDE7DB; --border: #1F2937;
      --card-green: #CFE3D1; --card-blue: #D6E2E8;
      --btn-bg: #111827; --btn-hover: #000000;
    }
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background-color: var(--bg); color: var(--text);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .card-border { border: 2px solid var(--border); }
    .btn-primary {
      background: var(--btn-bg); color: #fff;
      border-radius: 10px; padding: 8px 14px;
      font-weight: 600; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--btn-hover); transform: translateY(-1px); }
    .btn-secondary {
      background: #fff; color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      padding: 6px 12px; font-weight: 600; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: rgba(31,41,55,0.06); }
    .tpl-card {
      background: #fff; border-radius: 16px; border: 2px solid var(--border);
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .tpl-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
    .tpl-thumb {
      height: 140px; display: flex; align-items: center; justify-content: center;
      border-bottom: 2px solid var(--border); font-size: 48px; font-weight: 800;
      letter-spacing: -0.04em;
    }
    .cat-pill {
      padding: 6px 14px; font-weight: 600; font-size: 12px;
      border: 2px solid var(--border); border-radius: 999px; background: #fff;
      cursor: pointer; transition: background 0.15s;
    }
    .cat-pill.active { background: #111827; color: #fff; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; border: 1.5px solid var(--border);
      background: var(--card-green); color: #14532d;
    }
  </style>
</head>
<body>

  <header class="sticky top-0 z-40 backdrop-blur-sm" style="background: rgba(245,241,232,0.85); border-bottom: 1px solid #E6E1D8;">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button type="button" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
          <svg class="logo-light" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 15 L 78 15 A 15 15 0 0 1 78 45 L 58 45 Z" fill="currentColor"/>
            <rect x="8" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 55 L 78 55 A 15 15 0 0 1 78 85 L 58 85 Z" fill="#CFE3D1"/>
          </svg>
          <svg class="logo-dark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 8 15 L 28 15 A 15 15 0 0 1 28 45 L 8 45 Z" fill="currentColor"/>
            <rect x="42" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 8 55 L 28 55 A 15 15 0 0 1 28 85 L 8 85 Z" fill="#CFE3D1"/>
            <rect x="42" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
          </svg>
        </button>
        <a href="index.html" class="text-lg font-bold tracking-tight brand-text" style="color: var(--text);"><span>A</span><span class="f">wesome</span><span class="s">&nbsp;</span><span>C</span><span class="f">rew</span></a>
      </div>
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="btn-secondary" style="font-size: 13px; padding: 8px 14px;">Dashboard</a>
        <a href="generate.html" class="btn-primary" style="font-size: 13px; padding: 10px 18px;">New page</a>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-6 pt-12 pb-24">

    <div class="mb-6">
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Open-source templates</h1>
      <p class="text-sm mt-2" style="color: var(--text-muted);">Hand-picked starting points from GitHub. Pick one, click "Use as seed," and the generator will tailor it to your brand.</p>
    </div>

    <div class="flex flex-wrap gap-2 mb-8" id="categories">
      <button class="cat-pill active" data-cat="all">All</button>
      <button class="cat-pill" data-cat="saas">SaaS</button>
      <button class="cat-pill" data-cat="services">Services</button>
      <button class="cat-pill" data-cat="portfolio">Portfolios</button>
      <button class="cat-pill" data-cat="ecommerce">E-commerce</button>
      <button class="cat-pill" data-cat="startup">Startup</button>
      <button class="cat-pill" data-cat="personal">Personal</button>
    </div>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  </main>

  <footer class="border-t mt-12" style="border-color: #E6E1D8; background: rgba(245,241,232,0.6);">
    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between gap-4 items-center">
      <p class="text-xs" style="color: var(--text-muted);">© <span id="year"></span> Awesome Crew. Templates are linked to their original repositories — all credit to the authors.</p>
      <div class="flex flex-wrap gap-6 text-xs">
        <a href="dashboard.html" class="hover:underline" style="color: var(--text-sec);">Dashboard</a>
        <a href="docs.html" class="hover:underline" style="color: var(--text-sec);">Docs</a>
      </div>
    </div>
  </footer>

      { name: 'Snipcart Tailwind', cat: 'ecommerce', repo: 'https://github.com/snipcart/snipcart-tailwindcss',               author: 'Snipcart',      blurb: 'Snipcart + Tailwind e-commerce starter.',               accent: '#D6E2E8', seed: 'Small batch maker store, artisanal warm aesthetic' },
      { name: 'Shoppy',            cat: 'ecommerce', repo: 'https://github.com/rgrzechocinski/shoppy',                       author: 'rgrz',          blurb: 'Lightweight shop landing template.',                    accent: '#CFE3D1', seed: 'Boutique shop landing, product carousel hero' },
      { name: 'Saleor Storefront', cat: 'ecommerce', repo: 'https://github.com/saleor/storefront',                           author: 'Saleor',        blurb: 'Headless storefront in Next.js.',                       accent: '#D6E2E8', seed: 'Modern B2B marketplace, dense product grid' },
      { name: 'Tailwind Ecommerce',cat: 'ecommerce', repo: 'https://github.com/tailwindlabs/headlessui',                     author: 'Tailwind Labs', blurb: 'Headless UI patterns for store UI.',                    accent: '#CFE3D1', seed: 'Accessories shop, colorful tailwind design' },

      { name: 'Hugo PaperMod',     cat: 'personal',  repo: 'https://github.com/adityatelange/hugo-PaperMod',                 author: 'adityatelange', blurb: 'Clean Hugo personal / blog theme.',                       accent: '#D6E2E8', seed: 'Thought-leader personal site, light serif + blog' },

    ];

    function render(cat) {
      const grid = document.getElementById('grid');
      const list = cat === 'all' ? TEMPLATES : TEMPLATES.filter(t => t.cat === cat);
      grid.innerHTML = list.map(t => `
        <div class="tpl-card">
          <div class="tpl-thumb" style="background:${t.accent};color:#111827;">${initials(t.name)}</div>
          <div class="p-5 flex flex-col flex-grow">
            <div class="flex items-center gap-2 mb-2">
              <span class="chip">${categoryLabel(t.cat)}</span>
              <span class="text-[11px] font-medium" style="color: var(--text-muted);">${escapeHtml(t.author)}</span>
            </div>
            <h3 class="text-lg font-bold tracking-tight mb-1">${escapeHtml(t.name)}</h3>
            <p class="text-xs mb-4 flex-grow" style="color: var(--text-muted);">${escapeHtml(t.blurb)}</p>
            <div class="flex items-center gap-2 mt-auto">
              <a href="${t.repo}" target="_blank" rel="noopener" class="btn-secondary">GitHub</a>
              <a href="generate.html?seed=${encodeURIComponent(t.seed)}" class="btn-primary">Use as seed</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function initials(s) {
      return s.split(/\s+/).slice(0, 2).map(x => x[0]).join('').toUpperCase();
    }
    function categoryLabel(c) {
      return { saas: 'SaaS', services: 'Services', portfolio: 'Portfolio', ecommerce: 'E-commerce', startup: 'Startup', personal: 'Personal' }[c] || c;
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.querySelectorAll('.cat-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.cat);
      });
    });

    render('all');
  </script>
</body>
</html>
