<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Reset Password — Awesome Crew</title>
  <meta name="description" content="Set a new password for your Awesome Crew account."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="theme.css" rel="stylesheet"/>
  <script>if(localStorage.getItem('ac-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <script src="theme.js" defer></script>
  <style>
    :root {
      --bg: #F5F1E8; --grid: #E6E1D8;
      --text: #111827; --text-sec: #374151; --text-muted: #6B7280;
      --container: #EDE7DB; --border: #1F2937;
      --card-green: #CFE3D1; --card-blue: #D6E2E8;
      --btn-bg: #111827; --btn-hover: #000000;
    }
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background-color: var(--bg); color: var(--text);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .card-border { border: 2px solid var(--border); }
    .btn-primary {
      background: var(--btn-bg); color: #fff;
      border-radius: 10px; padding: 12px 24px;
      font-weight: 600; font-size: 14px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--btn-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .field {
      width: 100%; padding: 12px 14px;
      background: #fff; border: 2px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      transition: box-shadow 0.15s;
    }
    .field:focus { outline: none; box-shadow: 0 0 0 3px rgba(31,41,55,0.12); }
  </style>
</head>
<body class="flex flex-col">

  <header class="sticky top-0 z-40 backdrop-blur-sm" style="background: rgba(245,241,232,0.85); border-bottom: 1px solid #E6E1D8;">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button type="button" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
          <svg class="logo-light" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 15 L 78 15 A 15 15 0 0 1 78 45 L 58 45 Z" fill="currentColor"/>
            <rect x="8" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 55 L 78 55 A 15 15 0 0 1 78 85 L 58 85 Z" fill="#CFE3D1"/>
          </svg>
          <svg class="logo-dark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 8 15 L 28 15 A 15 15 0 0 1 28 45 L 8 45 Z" fill="currentColor"/>
            <rect x="42" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 8 55 L 28 55 A 15 15 0 0 1 28 85 L 8 85 Z" fill="#CFE3D1"/>
            <rect x="42" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
          </svg>
        </button>
        <a href="index.html" class="text-lg font-bold tracking-tight brand-text" style="color: var(--text);"><span>A</span><span class="f">wesome</span><span class="s">&nbsp;</span><span>C</span><span class="f">rew</span></a>
      </div>
      <a href="login.html" class="text-sm font-medium" style="color: var(--text-sec);">Back to sign in</a>
    </nav>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">
      <div class="rounded-[20px] card-border p-8 md:p-10" style="background: var(--container);">
        <h1 class="text-3xl font-bold tracking-tight mb-2">Set a new password</h1>
        <p class="text-sm mb-6" style="color: var(--text-muted);">Choose a password for your account.</p>

        <div id="loading" class="text-sm" style="color: var(--text-muted);">Verifying link…</div>

        <form id="reset-form" class="hidden flex-col gap-3">
          <div>
            <label for="new-password" class="block text-xs font-semibold mb-1.5" style="color: var(--text-sec);">New password</label>
            <input id="new-password" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" class="field"/>
          </div>
          <div>
            <label for="confirm-password" class="block text-xs font-semibold mb-1.5" style="color: var(--text-sec);">Confirm password</label>
            <input id="confirm-password" type="password" required minlength="6" autocomplete="new-password" placeholder="Repeat password" class="field"/>
          </div>
          <button type="submit" id="btn-update" class="btn-primary mt-2">Update password</button>
        </form>

        <div id="toast" class="hidden mt-4 px-4 py-3 rounded-[10px] text-sm font-medium"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://ltvxbquveerzjizfbzvv.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0dnhicXV2ZWVyemppemZienZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTUyNzcsImV4cCI6MjA5MTk3MTI3N30.vj7SNmI4oFKxD-wyaoZ45RTuQ38IpjyzQYTGSmaJjOo';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const loadingEl = document.getElementById('loading');
    const formEl = document.getElementById('reset-form');
    const toastEl = document.getElementById('toast');
    const btnUpdate = document.getElementById('btn-update');

    function showToast(msg, type = 'success') {
      toastEl.textContent = msg;
      toastEl.className = 'mt-4 px-4 py-3 rounded-[10px] text-sm font-medium block';
      if (type === 'success') {
        toastEl.style.background = '#CFE3D1';
        toastEl.style.border = '2px solid #1F2937';
        toastEl.style.color = '#111827';
      } else {
        toastEl.style.background = '#FEE2E2';
        toastEl.style.border = '2px solid #991B1B';
        toastEl.style.color = '#7F1D1D';
      }
    }

    function showForm() {
      loadingEl.classList.add('hidden');
      formEl.className = 'flex flex-col gap-3';
    }

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
        showForm();
      }
    });

    sb.auth.getSession().then(({ data }) => {
      if (data.session) showForm();
      else {
        setTimeout(() => {
          if (formEl.classList.contains('hidden')) {
            loadingEl.innerHTML = 'This reset link is invalid or expired. <a href="login.html" class="underline font-semibold">Request a new one</a>.';
          }
        }, 2000);
      }
    });

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (pwd !== confirm) { showToast('Passwords do not match.', 'error'); return; }
      btnUpdate.disabled = true;
      btnUpdate.textContent = 'Updating…';
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) {
        showToast(error.message, 'error');
        btnUpdate.disabled = false;
        btnUpdate.textContent = 'Update password';
        return;
      }
      showToast('Password updated. Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    });
  </script>
</body>
</html>
