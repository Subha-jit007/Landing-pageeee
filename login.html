<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign In — Awesome Crew</title>
  <meta name="description" content="Sign in to Awesome Crew to build and manage your landing pages."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="theme.css" rel="stylesheet"/>
  <script>if(localStorage.getItem('ac-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <script src="theme.js" defer></script>
  <style>
    :root {
      --bg: #F5F1E8; --grid: #E6E1D8;
      --text: #111827; --text-sec: #374151; --text-muted: #6B7280;
      --container: #EDE7DB; --border: #1F2937;
      --card-green: #CFE3D1; --card-blue: #D6E2E8;
      --btn-bg: #111827; --btn-hover: #000000;
    }
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background-color: var(--bg); color: var(--text);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .card-border { border: 2px solid var(--border); }
    .btn-primary {
      background: var(--btn-bg); color: #fff;
      border-radius: 10px; padding: 12px 24px;
      font-weight: 600; font-size: 14px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--btn-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      padding: 10px 16px; font-weight: 600; font-size: 14px;
      transition: background 0.15s;
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(31,41,55,0.06); }
    .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }
    .field {
      width: 100%; padding: 12px 14px;
      background: #fff; border: 2px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      transition: box-shadow 0.15s;
    }
    .field:focus { outline: none; box-shadow: 0 0 0 3px rgba(31,41,55,0.12); }
    .tab-btn {
      flex: 1; padding: 10px; font-size: 13px; font-weight: 600;
      border-radius: 8px; transition: all 0.15s;
      color: var(--text-muted); background: transparent;
    }
    .tab-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  </style>
</head>
<body class="flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-40 backdrop-blur-sm" style="background: rgba(245,241,232,0.85); border-bottom: 1px solid #E6E1D8;">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button type="button" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
          <svg class="logo-light" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 15 L 78 15 A 15 15 0 0 1 78 45 L 58 45 Z" fill="currentColor"/>
            <rect x="8" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 58 55 L 78 55 A 15 15 0 0 1 78 85 L 58 85 Z" fill="#CFE3D1"/>
          </svg>
          <svg class="logo-dark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 8 15 L 28 15 A 15 15 0 0 1 28 45 L 8 45 Z" fill="currentColor"/>
            <rect x="42" y="15" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M 8 55 L 28 55 A 15 15 0 0 1 28 85 L 8 85 Z" fill="#CFE3D1"/>
            <rect x="42" y="55" width="50" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="5"/>
          </svg>
        </button>
        <a href="index.html" class="text-lg font-bold tracking-tight brand-text" style="color: var(--text);"><span>A</span><span class="f">wesome</span><span class="s">&nbsp;</span><span>C</span><span class="f">rew</span></a>
      </div>
      <a href="index.html" class="text-sm font-medium flex items-center gap-1.5" style="color: var(--text-sec);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
    </nav>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">

      <div class="rounded-[20px] card-border p-8 md:p-10" style="background: var(--container);">

        <h1 class="text-3xl font-bold tracking-tight mb-2" style="color: var(--text);">Welcome back</h1>
        <p class="text-sm mb-8" style="color: var(--text-muted);">Sign in to continue building.</p>

        <!-- Tabs -->
        <div class="flex gap-1 p-1 rounded-[10px] mb-6" style="background: rgba(31,41,55,0.08);">
          <button id="tab-signin" class="tab-btn active" type="button">Sign in</button>
          <button id="tab-signup" class="tab-btn" type="button">Create account</button>
        </div>

        <!-- Email + password form -->
        <form id="auth-form" class="flex flex-col gap-3">
          <div>
            <label for="email" class="block text-xs font-semibold mb-1.5" style="color: var(--text-sec);">Email</label>
            <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" class="field"/>
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-xs font-semibold" style="color: var(--text-sec);">Password</label>
              <button type="button" id="btn-forgot" class="text-xs font-semibold underline" style="color: var(--text-sec);">Forgot password?</button>
            </div>
            <input id="password" type="password" required minlength="6" autocomplete="current-password" placeholder="At least 6 characters" class="field"/>
          </div>
          <button type="submit" id="btn-submit" class="btn-primary mt-2">Sign in</button>
        </form>

        <div class="flex items-center gap-3 my-5">
          <hr class="flex-1" style="border-color: rgba(31,41,55,0.15);"/>
          <span class="text-xs font-medium" style="color: var(--text-muted);">or</span>
          <hr class="flex-1" style="border-color: rgba(31,41,55,0.15);"/>
        </div>

        <button id="btn-magic" type="button" class="btn-secondary w-full flex items-center justify-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email me a sign-in link
        </button>

        <!-- Toast -->
        <div id="toast" class="hidden mt-4 px-4 py-3 rounded-[10px] text-sm font-medium"></div>

        <p class="text-xs text-center mt-6 leading-relaxed" style="color: var(--text-muted);">
          By continuing you agree to our
          <a href="terms.html" class="underline hover:text-black">Terms</a> and
          <a href="privacy.html" class="underline hover:text-black">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://ltvxbquveerzjizfbzvv.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0dnhicXV2ZWVyemppemZienZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTUyNzcsImV4cCI6MjA5MTk3MTI3N30.vj7SNmI4oFKxD-wyaoZ45RTuQ38IpjyzQYTGSmaJjOo';

    // Always redirect OAuth flows to production, never localhost
    const SITE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? location.origin
      : 'https://landing-pageeee.vercel.app';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // If already signed in, skip straight to dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    let mode = 'signin'; // or 'signup'

    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    const btnSubmit = document.getElementById('btn-submit');
    const pwdInput  = document.getElementById('password');

    function setMode(next) {
      mode = next;
      tabSignin.classList.toggle('active', mode === 'signin');
      tabSignup.classList.toggle('active', mode === 'signup');
      btnSubmit.textContent = mode === 'signin' ? 'Sign in' : 'Create account';
      pwdInput.setAttribute('autocomplete', mode === 'signin' ? 'current-password' : 'new-password');
      document.getElementById('btn-forgot').style.visibility = mode === 'signin' ? 'visible' : 'hidden';
      hideToast();
    }
    tabSignin.addEventListener('click', () => setMode('signin'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'mt-4 px-4 py-3 rounded-[10px] text-sm font-medium block';
      if (type === 'success') {
        t.style.background = '#CFE3D1';
        t.style.border = '2px solid #1F2937';
        t.style.color = '#111827';
      } else {
        t.style.background = '#FEE2E2';
        t.style.border = '2px solid #991B1B';
        t.style.color = '#7F1D1D';
      }
    }
    function hideToast() {
      document.getElementById('toast').className = 'hidden';
    }

    function setLoading(btn, loading, label) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : label;
    }

    function friendlyError(msg) {
      const m = (msg || '').toLowerCase();
      if (m.includes('invalid login credentials')) {
        return 'Email or password is incorrect. Use "Forgot password?" or the email sign-in link below.';
      }
      if (m.includes('email not confirmed')) {
        return 'Please confirm your email first — check your inbox for the confirmation link.';
      }
      if (m.includes('user already registered')) {
        return 'An account with this email already exists. Switch to Sign in.';
      }
      if (m.includes('rate limit') || m.includes('too many')) {
        return 'Too many attempts. Please wait a minute and try again.';
      }
      return msg || 'Something went wrong. Please try again.';
    }

    document.getElementById('btn-magic').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      const email = document.getElementById('email').value.trim();
      if (!email) { showToast('Enter your email above first.', 'error'); return; }
      hideToast();
      btn.disabled = true;
      const original = btn.innerHTML;
      btn.textContent = 'Sending link…';
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: SITE_URL + '/dashboard.html' }
      });
      btn.disabled = false;
      btn.innerHTML = original;
      if (error) { showToast(friendlyError(error.message), 'error'); return; }
      showToast('Check your inbox — we sent you a sign-in link.', 'success');
    });

    document.getElementById('btn-forgot').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showToast('Enter your email above first.', 'error'); return; }
      hideToast();
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: SITE_URL + '/reset-password.html'
      });
      if (error) { showToast(friendlyError(error.message), 'error'); return; }
      showToast('Password reset link sent — check your inbox.', 'success');
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideToast();
      const email = document.getElementById('email').value.trim();
      const password = pwdInput.value;
      const label = mode === 'signin' ? 'Sign in' : 'Create account';
      setLoading(btnSubmit, true, label);

      if (mode === 'signin') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { showToast(friendlyError(error.message), 'error'); setLoading(btnSubmit, false, label); return; }
        window.location.href = 'dashboard.html';
      } else {
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { emailRedirectTo: SITE_URL + '/dashboard.html' }
        });
        setLoading(btnSubmit, false, label);
        if (error) { showToast(friendlyError(error.message), 'error'); return; }
        if (data.session) {
          window.location.href = 'dashboard.html';
        } else {
          showToast('Account created! Check your inbox to confirm, then sign in.', 'success');
          setMode('signin');
        }
      }
    });
  </script>
</body>
</html>
